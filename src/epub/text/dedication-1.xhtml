<h2>TO</h2>

<h5>ROBERT GAMBLE CABELL I</h5>

<p>  "He loved chivalrye,<br/>

  Trouthe and honour, fredom and curteisye.<br/>

  And of his port as meek as is a mayde,<br/>

  He never yet no vileinye ne sayde<br/>

  In al his lyf, unto no maner wight.<br/>

  He was a verray parfit gentil knyght."<br/>
</p>
