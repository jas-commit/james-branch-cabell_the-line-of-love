	<body epub:type="frontmatter z3998:non-fiction">
		<section id="dedication-1" epub:type="dedication">
			<header>
				<p>
					<b>To Robert Gamble Cabell <span epub:type="z3998:ordinal z3998:roman">I</span></b>
				</p>
			</header>
			<blockquote epub:type="epigraph z3998:verse" xml:lang="enm">
				<p>
					<span>“He loved chivalrye,</span>
					<br/>
					<span>Trouthe and honour, fredom and curteisye.</span>
					<br/>
					<span class="elison">⋮</span>
					<br/>
					<span>And of his port as meek as is a mayde,</span>
					<br/>
					<span>He never yet no vileinye ne sayde</span>
					<br/>
					<span>In al his lyf, unto no maner wight.</span>
					<br/>
					<span>He was a verray parfit gentil knyght.”</span>
				</p>
			</blockquote>
		</section>
	</body>
